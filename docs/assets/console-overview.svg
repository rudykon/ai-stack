<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Console Overview</title>
  <desc id="desc">A polished mockup of the local stack console with chat, image and stack panels.</desc>
  <defs>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111827" flood-opacity="0.12"/></filter>
    <style>
      .bg{fill:#f7f8fa}.window{fill:#fff;stroke:#d8dee4;stroke-width:1.5;filter:url(#shadow)}.sidebar{fill:#f1f5f4;stroke:#d8dee4;stroke-width:1.5}.accent{fill:#176b5b}.line{stroke:#d8dee4;stroke-width:1.4}.input{fill:#fff;stroke:#d8dee4;stroke-width:1.3}.tabOn{fill:#e9f6ef;stroke:#a9d9bf;stroke-width:1.2}.tab{fill:#fff;stroke:#d8dee4;stroke-width:1.2}.chat{fill:#edf5ff;stroke:#cfe0f5;stroke-width:1.2}.assist{fill:#fff;stroke:#d8dee4;stroke-width:1.2}.image{fill:#fff5d8;stroke:#e7cf74;stroke-width:1.2}.stack{fill:#f3eefb;stroke:#d3c2f0;stroke-width:1.2}.ok{fill:#d8f1df}.idle{fill:#fff1c7}.title{font:800 24px Inter,Segoe UI,Arial,sans-serif;fill:#18202a}.label{font:750 16px Inter,Segoe UI,Arial,sans-serif;fill:#1f2328}.small{font:500 13px Inter,Segoe UI,Arial,sans-serif;fill:#667085}.tiny{font:760 11px Inter,Segoe UI,Arial,sans-serif;fill:#667085;letter-spacing:.5px}.mono{font:650 12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#3d444d}.white{font:800 17px Inter,Segoe UI,Arial,sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="20"/>
  <rect class="window" x="62" y="56" width="1076" height="606" rx="16"/>
  <rect class="sidebar" x="62" y="56" width="298" height="606" rx="16"/>
  <line class="line" x1="360" y1="56" x2="360" y2="662"/>

  <rect class="accent" x="96" y="92" width="46" height="46" rx="8"/>
  <text class="white" x="110" y="122">LS</text>
  <text class="title" x="158" y="110">Local Stack</text>
  <rect class="ok" x="158" y="122" width="72" height="24" rx="12"/>
  <text class="tiny" x="176" y="138">READY</text>

  <text class="tiny" x="96" y="190">CHAT MODEL</text>
  <rect class="input" x="96" y="204" width="226" height="44" rx="8"/>
  <text class="small" x="114" y="232">Qwen 3.6 27B</text>
  <text class="tiny" x="96" y="284">IMAGE MODEL</text>
  <rect class="input" x="96" y="298" width="226" height="44" rx="8"/>
  <text class="small" x="114" y="326">Qwen Image 2512</text>
  <text class="tiny" x="96" y="378">GENERATION</text>
  <rect class="input" x="96" y="392" width="102" height="42" rx="8"/><text class="small" x="116" y="419">512x512</text>
  <rect class="input" x="220" y="392" width="102" height="42" rx="8"/><text class="small" x="248" y="419">12 steps</text>
  <rect class="input" x="96" y="458" width="226" height="44" rx="8"/><text class="small" x="114" y="486">local-dev-key</text>

  <line class="line" x1="360" y1="134" x2="1138" y2="134"/>
  <rect class="tabOn" x="400" y="88" width="90" height="36" rx="8"/><text class="small" x="431" y="111">Chat</text>
  <rect class="tab" x="502" y="88" width="90" height="36" rx="8"/><text class="small" x="532" y="111">Image</text>
  <rect class="tab" x="604" y="88" width="90" height="36" rx="8"/><text class="small" x="635" y="111">Stack</text>

  <rect class="chat" x="760" y="176" width="318" height="70" rx="8"/>
  <text class="label" x="790" y="207">User request</text>
  <text class="small" x="790" y="231">Send a prompt through the gateway</text>
  <rect class="assist" x="410" y="276" width="470" height="96" rx="8"/>
  <text class="label" x="440" y="310">Assistant response</text>
  <text class="small" x="440" y="336">The gateway starts a worker only when the first request arrives.</text>
  <text class="mono" x="440" y="360">worker_running: false -> true</text>

  <rect class="input" x="410" y="522" width="556" height="74" rx="8"/>
  <text class="small" x="436" y="552">Send a message</text>
  <rect class="accent" x="982" y="522" width="96" height="74" rx="8"/>
  <text class="white" x="1014" y="565">Send</text>

  <rect class="image" x="930" y="296" width="148" height="148" rx="8"/>
  <rect x="958" y="324" width="92" height="92" rx="46" fill="#d85442" opacity="0.92"/>
  <text class="tiny" x="962" y="464">IMAGE RESULT</text>

  <rect class="stack" x="410" y="410" width="438" height="74" rx="8"/>
  <text class="label" x="440" y="442">Stack health</text>
  <text class="small" x="440" y="466">UI · Gateway · Runners · Operations</text>
  <rect class="ok" x="710" y="432" width="58" height="24" rx="12"/><text class="tiny" x="724" y="448">READY</text>
  <rect class="idle" x="778" y="432" width="50" height="24" rx="12"/><text class="tiny" x="792" y="448">IDLE</text>
</svg>
