<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Local AI Stack Architecture</title>
  <desc id="desc">A layered architecture diagram for the local AI stack: clients, gateway, model runners, registry and local operations.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.10"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
    <style>
      .bg{fill:#f7f8fa}.surface{fill:#ffffff;stroke:#d8dee4;stroke-width:1.5;filter:url(#shadow)}.group{fill:#ffffff;stroke:#d8dee4;stroke-width:1.5}.client{fill:#edf5ff;stroke:#b8d2f0;stroke-width:1.5}.gateway{fill:#e9f6ef;stroke:#a9d9bf;stroke-width:1.5}.runner{fill:#fff5d8;stroke:#e7cf74;stroke-width:1.5}.ops{fill:#f3eefb;stroke:#d3c2f0;stroke-width:1.5}.title{font:800 30px Inter,Segoe UI,Arial,sans-serif;fill:#18202a}.subtitle{font:500 16px Inter,Segoe UI,Arial,sans-serif;fill:#667085}.label{font:750 20px Inter,Segoe UI,Arial,sans-serif;fill:#1f2328}.small{font:500 14px Inter,Segoe UI,Arial,sans-serif;fill:#667085}.mono{font:650 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#3d444d}.chip{font:750 12px Inter,Segoe UI,Arial,sans-serif;fill:#245b49}.line{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.softline{stroke:#c6ced8;stroke-width:1.5;fill:none}.badge{fill:#ffffff;stroke:#cfd7df;stroke-width:1.2}.dot{fill:#176b5b}
    </style>
  </defs>
  <rect class="bg" width="1200" height="680" rx="20"/>
  <rect class="surface" x="42" y="38" width="1116" height="604" rx="16"/>

  <text class="title" x="82" y="88">Local AI Stack</text>
  <text class="subtitle" x="82" y="116">LAN-first console, OpenAI-compatible gateway, and lazy local model workers</text>

  <rect class="badge" x="887" y="68" width="210" height="34" rx="8"/>
  <circle class="dot" cx="908" cy="85" r="5"/>
  <text class="chip" x="922" y="90">generic model registry</text>

  <rect class="group" x="82" y="168" width="260" height="350" rx="10"/>
  <text class="small" x="106" y="202">CLIENT SURFACE</text>
  <rect class="client" x="106" y="226" width="212" height="74" rx="8"/>
  <text class="label" x="130" y="258">Web console</text>
  <text class="mono" x="130" y="282">Chat · Image · Stack</text>
  <rect class="client" x="106" y="322" width="212" height="74" rx="8"/>
  <text class="label" x="130" y="354">API clients</text>
  <text class="mono" x="130" y="378">curl · SDK · Open WebUI</text>
  <rect class="client" x="106" y="418" width="212" height="62" rx="8"/>
  <text class="label" x="130" y="450">LAN access</text>
  <text class="mono" x="130" y="472">http://&lt;LAN_IP&gt;:8080</text>

  <rect class="group" x="470" y="168" width="260" height="350" rx="10"/>
  <text class="small" x="494" y="202">CONTROL PLANE</text>
  <rect class="gateway" x="494" y="226" width="212" height="90" rx="8"/>
  <text class="label" x="518" y="258">Unified gateway</text>
  <text class="mono" x="518" y="282">/v1/models</text>
  <text class="mono" x="518" y="302">chat + images</text>
  <rect class="gateway" x="494" y="340" width="212" height="74" rx="8"/>
  <text class="label" x="518" y="372">Registry</text>
  <text class="mono" x="518" y="396">model_registry.json</text>
  <rect class="gateway" x="494" y="438" width="212" height="42" rx="8"/>
  <text class="mono" x="518" y="464">CORS · health · snippets</text>

  <rect class="group" x="858" y="168" width="260" height="350" rx="10"/>
  <text class="small" x="882" y="202">WORKER PLANE</text>
  <rect class="runner" x="882" y="226" width="212" height="78" rx="8"/>
  <text class="label" x="906" y="258">Chat runner</text>
  <text class="mono" x="906" y="282">:8000 -> worker</text>
  <rect class="runner" x="882" y="326" width="212" height="78" rx="8"/>
  <text class="label" x="906" y="358">Image runner</text>
  <text class="mono" x="906" y="382">:8001 -> worker</text>
  <rect class="ops" x="882" y="426" width="212" height="78" rx="8"/>
  <text class="label" x="906" y="458">Local state</text>
  <text class="mono" x="906" y="482">models · logs · outputs</text>

  <path class="line" d="M342 263 H470"/>
  <path class="line" d="M342 359 H470"/>
  <path class="line" d="M730 271 H858"/>
  <path class="line" d="M730 374 H858"/>
  <path class="softline" d="M600 414 V548 H988 V504"/>

  <rect class="badge" x="442" y="556" width="316" height="42" rx="8"/>
  <text class="small" x="468" y="582">Workers start on first request and unload after idle timeout</text>
</svg>
