<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Gateway Request Flow</title>
  <desc id="desc">A simple ASCII-style request flow diagram for the local AI gateway.</desc>
  <rect width="1200" height="420" fill="#ffffff"/>
  <text x="72" y="70" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700" fill="#1f2328">Unified Gateway Flow</text>
  <text x="72" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#1f2328" xml:space="preserve">
    <tspan x="72" dy="0">+-------------+     +-------------+     +--------------+     +-------------+</tspan>
    <tspan x="72" dy="30">| Client      | --&gt; | Gateway     | --&gt; | Lazy proxy   | --&gt; | Result      |</tspan>
    <tspan x="72" dy="30">| /v1 request |     | route       |     | start worker |     | stream/img  |</tspan>
    <tspan x="72" dy="30">+-------------+     +-------------+     +--------------+     +-------------+</tspan>
    <tspan x="72" dy="52">                         |</tspan>
    <tspan x="72" dy="30">                         +-- chat:  /chat/completions  -&gt; text worker</tspan>
    <tspan x="72" dy="30">                         +-- image: /images/generations -&gt; image worker</tspan>
    <tspan x="72" dy="58">idle timeout -&gt; worker exits -&gt; CUDA memory released</tspan>
  </text>
</svg>
