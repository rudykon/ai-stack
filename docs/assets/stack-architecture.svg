<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Local AI Stack Architecture</title>
  <desc id="desc">A simple ASCII-style architecture diagram for the local AI stack.</desc>
  <rect width="1200" height="420" fill="#ffffff"/>
  <text x="72" y="70" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700" fill="#1f2328">Local AI Stack</text>
  <text x="72" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#1f2328" xml:space="preserve">
    <tspan x="72" dy="0">+------------------+      +----------------------+      +------------------+</tspan>
    <tspan x="72" dy="30">| Clients          |      | Gateway              |      | Runners          |</tspan>
    <tspan x="72" dy="30">|                  |      |                      |      |                  |</tspan>
    <tspan x="72" dy="30">| Web UI           | ---&gt; | /v1 API              | ---&gt; | Chat worker      |</tspan>
    <tspan x="72" dy="30">| API clients      |      | Model registry       |      | Image worker     |</tspan>
    <tspan x="72" dy="30">| &lt;LAN_IP&gt;:8080    |      | Health / routing     |      | Models / logs    |</tspan>
    <tspan x="72" dy="30">+------------------+      +----------------------+      +------------------+</tspan>
    <tspan x="72" dy="58">lazy load  -&gt;  idle unload  -&gt;  local first</tspan>
  </text>
</svg>
