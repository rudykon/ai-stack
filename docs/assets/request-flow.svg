<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Gateway Request Flow</title>
  <desc id="desc">A four-step request flow from client to gateway, route selection, lazy worker startup and idle unload.</desc>
  <defs>
    <filter id="shadow" x="-18%" y="-20%" width="136%" height="140%"><feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#111827" flood-opacity="0.09"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
    <style>
      .bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#d8dee4;stroke-width:1.5;filter:url(#shadow)}.card{fill:#fff;stroke:#d8dee4;stroke-width:1.4}.blue{fill:#edf5ff;stroke:#b8d2f0;stroke-width:1.4}.green{fill:#e9f6ef;stroke:#a9d9bf;stroke-width:1.4}.yellow{fill:#fff5d8;stroke:#e7cf74;stroke-width:1.4}.purple{fill:#f3eefb;stroke:#d3c2f0;stroke-width:1.4}.title{font:800 30px Inter,Segoe UI,Arial,sans-serif;fill:#18202a}.subtitle{font:500 16px Inter,Segoe UI,Arial,sans-serif;fill:#667085}.label{font:760 19px Inter,Segoe UI,Arial,sans-serif;fill:#1f2328}.small{font:500 14px Inter,Segoe UI,Arial,sans-serif;fill:#667085}.mono{font:650 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#3d444d}.num{font:800 16px Inter,Segoe UI,Arial,sans-serif;fill:#fff}.line{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.track{stroke:#cbd5df;stroke-width:2;fill:none}.circle{fill:#176b5b}
    </style>
  </defs>
  <rect class="bg" width="1200" height="560" rx="20"/>
  <rect class="panel" x="42" y="38" width="1116" height="484" rx="16"/>
  <text class="title" x="82" y="88">Unified Gateway Flow</text>
  <text class="subtitle" x="82" y="116">One OpenAI-compatible endpoint fans out to text and image workers without keeping models resident.</text>

  <path class="track" d="M164 260 H1010"/>
  <g>
    <circle class="circle" cx="164" cy="260" r="18"/><text class="num" x="159" y="266">1</text>
    <rect class="blue" x="82" y="176" width="164" height="88" rx="8"/>
    <text class="label" x="112" y="210">Client</text>
    <text class="mono" x="112" y="236">/v1 request</text>
  </g>
  <g>
    <circle class="circle" cx="416" cy="260" r="18"/><text class="num" x="411" y="266">2</text>
    <rect class="green" x="318" y="176" width="196" height="88" rx="8"/>
    <text class="label" x="348" y="210">Gateway</text>
    <text class="mono" x="348" y="236">route by endpoint</text>
  </g>
  <g>
    <circle class="circle" cx="700" cy="260" r="18"/><text class="num" x="695" y="266">3</text>
    <rect class="yellow" x="590" y="176" width="220" height="88" rx="8"/>
    <text class="label" x="620" y="210">Lazy proxy</text>
    <text class="mono" x="620" y="236">start worker if idle</text>
  </g>
  <g>
    <circle class="circle" cx="1010" cy="260" r="18"/><text class="num" x="1005" y="266">4</text>
    <rect class="purple" x="910" y="176" width="200" height="88" rx="8"/>
    <text class="label" x="940" y="210">Result</text>
    <text class="mono" x="940" y="236">stream or image</text>
  </g>

  <path class="line" d="M246 220 H318"/>
  <path class="line" d="M514 220 H590"/>
  <path class="line" d="M810 220 H910"/>

  <rect class="card" x="318" y="328" width="244" height="96" rx="8"/>
  <text class="label" x="348" y="362">Chat path</text>
  <text class="mono" x="348" y="388">/chat/completions</text>
  <text class="small" x="348" y="412">text proxy -> text worker</text>

  <rect class="card" x="638" y="328" width="244" height="96" rx="8"/>
  <text class="label" x="668" y="362">Image path</text>
  <text class="mono" x="668" y="388">/images/generations</text>
  <text class="small" x="668" y="412">image proxy -> image worker</text>

  <path class="line" d="M416 264 C416 292 416 306 416 328"/>
  <path class="line" d="M700 264 C700 292 760 306 760 328"/>

  <rect class="card" x="82" y="456" width="1028" height="34" rx="8"/>
  <text class="small" x="108" y="478">Idle reaper: when no active requests remain, workers exit after the configured timeout so CUDA memory is released.</text>
</svg>
